<!doctype html>
<html>
<head>
<link rel="stylesheet" href="Stiil.css"/>
<title>
Ajupeer
</title>
</head>

<body>
<header>
    <h1>
        Sisukord
    </h1>
</header>
<div class="ruudustik">
    <button class="infonupp">
        <span class="failinimi">Airy ketas.txt</span>
        <span class="kokkuvõte">Airy ketas on valgusringide süsteemi keskmine valgusring, mille pisitillukest auku läbiv valgus seinale heidab.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Alaldi.txt</span>
        <span class="kokkuvõte">Alaldi on seade, mis muudab vahelduvvoolu alalisvooluks.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Baidijärjestus.txt</span>
        <span class="kokkuvõte">Opsüsteemide mälus on mõjukamad baidid suurematel aadressidel, mistõttu on nende järjekorda vaja vahel teisendada.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Bipolaartransistor.txt</span>
        <span class="kokkuvõte">Bipolaartransistor laseb suurt põhivoolu läbi võrdeliselt väikese sisendvooluga, et seda võimendada.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Fresneli tsoonid.txt</span>
        <span class="kokkuvõte">Fresneli tsoonid on valgusfrondi osad, millest lähtuv valgus on vaatluspunktis ligikaudu samas faasis.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Hõõrdeelekter.txt</span>
        <span class="kokkuvõte">Hõõrdeelekter uurib, kuidas laengud kehade hõõrdumisel ühelt teisele kanduvad.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Kesktõmbekiirendus.txt</span>
        <span class="kokkuvõte">Kesktõmbekiirendust on vaja, et hoida objekti ühtlases ringjoonelises liikumises.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Hõõrdetegur.txt</span>
        <span class="kokkuvõte">Hõõrdetegur ütleb, kui mitu korda on hõõrdejõud suurem normaaljõust.</span>
    </button>

    <button class="infonupp">
        <span class="failinimi">Impulsimoment.txt</span>
        <span class="kokkuvõte">Impulsimoment kirjeldab, kui palju kehal parajasti pöörlemist on.</span>
    </button>
</div>
</body>
</html>
