<h1>
Muffin ja tassikook
</h1>
</header>
<p>
Tassikook on palju peenem söök kui muffin. Tassikoogid on tihti peenelt kaunistatud vahukoore, suhkruteradega, marjadega. Seda serveeritakse alustassi peal. Muffin on lihtsalt muffinitainast muffinivormis küpsetatud käkk, mille juures eriti midagi peent ei ole.
</p>
